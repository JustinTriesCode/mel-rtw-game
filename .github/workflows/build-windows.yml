name: Build Release Apps
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21 
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        working-directory: ./MelSimpleGame
        run: mvn clean package

      - name: Package with jpackage
        working-directory: ./MelSimpleGame
        run: |
          jpackage --type exe `
            --win-console `
            --win-upgrade-uuid "794e7722-1d51-411a-9694-8178c7438c71" `
            --input target `
            --dest dist `
            --name "MellyMinigames" `
            --main-jar MellyMinigames-1.0.jar `
            --main-class com.justintriescode.mellysgame.Main `
            --icon "src/main/resources/images/app_icon.ico" `
            --win-shortcut `
            --win-menu `
            --win-dir-chooser `
            --vendor "JustinTriesToCode" `
            --app-version "1.0"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: MelSimpleGame/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21 
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        working-directory: ./MelSimpleGame
        run: mvn clean package

      - name: Convert PNG to ICNS
        working-directory: ./MelSimpleGame
        run: sips -s format icns src/main/resources/images/app_icon.png --out src/main/resources/images/app_icon.icns

      - name: Package with jpackage
        working-directory: ./MelSimpleGame
        run: |
          jpackage --type dmg \
            --input target \
            --dest dist \
            --name "MellyMinigames" \
            --main-jar MellyMinigames-1.0.jar \
            --main-class com.justintriescode.mellysgame.Main \
            --icon "src/main/resources/images/app_icon.icns" \
            --vendor "JustinTriesToCode" \
            --app-version "1.0"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: MelSimpleGame/dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
